<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poollogic</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #ffffff;
            min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
}
    h1 { font-size: 3rem; font-weight: 700; margin-bottom: 1rem; }
    p { font-size: 1.25rem; color: #9ca3af; margin-bottom: 2rem; max-width: 500px; }
    a.btn {
      display: inline-block;
      background: #3b82f6;
      color: #fff;
            text-decoration: none;
      padding: 0.875rem 2rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    a.btn:hover { background: #2563eb; }
  </style>
    </head>
    <body>
      <h1>Poollogic</h1>
      <p>Smart pool management software. Log in to your account to get started.</p>
      <a class="btn" href="https://app.poollogic.app">Go to App &rarr;</a>
    </body>
    </html>
